<title>找到你的教練天賦｜五力陪跑系統</title>
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; overflow-x:hidden; }
  :root {
    /* 五力陪跑系統色彩語彙 */
    --c-relation: #FF8AAE; /* 關係 A */
    --c-tool:     #7FD8C5; /* 工具 B */
    --c-retail:   #FFB37A; /* 零售 C */
    --c-recruit:  #B89CFF; /* 招募 D */
    --c-media:    #89B8E5; /* 自媒體 E */
    --c-primary:  #5B2C82; /* 深紫主色 */
    --c-accent:   #FF6F91; /* 珊瑚強調 */
    --c-mint:     #4ECDC4; /* 薄荷完成色 */
    --c-cream:    #FFF7EC; /* 米奶油底色 */
    --c-lavender: #F3EEFF; /* 淡紫輔色 */
    --c-ink:      #4A3B78; /* 內文紫 */
    --c-ink-soft: #7E7398; /* 內文紫淡 */
  }
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, "Segoe UI Emoji", sans-serif;
    font-weight: 500;
    min-height:100vh;
    /* 改：靜態柔和米→淡紫漸層（不再滾動動畫，眼睛不疲勞） */
    background: linear-gradient(180deg, var(--c-cream) 0%, var(--c-lavender) 100%);
    display:flex; align-items:center; justify-content:center;
    padding: max(20px, env(safe-area-inset-top)) 14px max(20px, env(safe-area-inset-bottom));
    position:relative;
    color: var(--c-ink);
  }
  /* 極慢的呼吸光暈（30s 一輪，視覺不刺眼） */
  body::before {
    content:"";
    position:fixed; inset:-20%;
    background:
      radial-gradient(40% 30% at 20% 30%, rgba(255,138,174,0.18), transparent 60%),
      radial-gradient(40% 30% at 80% 70%, rgba(127,216,197,0.16), transparent 60%),
      radial-gradient(30% 25% at 50% 90%, rgba(184,156,255,0.14), transparent 65%);
    animation: breath 30s ease-in-out infinite alternate;
    z-index:0; pointer-events:none;
  }
  @keyframes breath { from{transform:translate(0,0) scale(1);} to{transform:translate(2%,-1%) scale(1.04);} }

  .float-emoji {
    position:fixed; font-size:clamp(14px,3.5vw,22px); opacity:0.35; z-index:0;
    animation: floatUp linear infinite;
    user-select:none; pointer-events:none; will-change: transform;
  }
  /* 改：每個 emoji 不同的水平 base + 不同 duration 製造更自然的星空感 */
  @keyframes floatUp {
    0%   { transform: translate3d(0, 110vh, 0) rotate(0deg);   opacity:0; }
    8%   { opacity: 0.45; }
    92%  { opacity: 0.45; }
    100% { transform: translate3d(20px, -12vh, 0) rotate(360deg); opacity:0; }
  }

  .card {
    background:#ffffff;
    border-radius: 28px;
    box-shadow:
      0 20px 60px rgba(91,44,130,0.10),
      0 4px 12px rgba(91,44,130,0.06);
    max-width: 600px; width: 100%;
    padding: clamp(22px,5vw,34px) clamp(16px,5vw,28px) clamp(30px,6vw,42px);
    position:relative; z-index:2;
    animation: popIn 0.5s cubic-bezier(.22,.9,.3,1);
  }
  @keyframes popIn { from{opacity:0; transform:scale(0.94);} to{opacity:1; transform:scale(1);} }

  /* ---------- 開場頁 ---------- */
  #startScreen { text-align:center; }
  #startScreen h1 {
    font-size:clamp(22px,6vw,28px);
    font-weight:800; color:var(--c-primary);
    letter-spacing: 0.02em;
    margin-bottom: 10px; line-height:1.3;
  }
  #startScreen h1 .accent { color: var(--c-accent); }
  #startScreen .sub {
    font-size:clamp(13.5px,3.7vw,15px); color:var(--c-ink-soft);
    margin-bottom: 22px; line-height:1.85;
  }
  #startScreen .sub b { color: var(--c-primary); font-weight:700; }

  /* 改：badge 改用 chip 樣式，不再撐滿寬，視覺密度更像預告 */
  .badge-row {
    display:flex; justify-content:center; gap:6px;
    flex-wrap:wrap;
    margin: 20px 0 18px; padding: 4px 2px 8px;
  }
  .badge {
    background:#fff;
    border:1.5px solid rgba(184,156,255,0.18);
    border-radius: 999px;
    padding: 7px 12px;
    font-size:clamp(11px,2.9vw,12.5px);
    color: var(--c-ink-soft);
    box-shadow: 0 2px 6px rgba(91,44,130,0.04);
    display:inline-flex; align-items:center; gap:5px;
    white-space:nowrap; flex-shrink:0;
  }
  .badge .emo { font-size:clamp(13px,3.5vw,15px); }
  .badge[data-t="A"] { border-color: rgba(255,138,174,0.4); }
  .badge[data-t="B"] { border-color: rgba(127,216,197,0.4); }
  .badge[data-t="C"] { border-color: rgba(255,179,122,0.4); }
  .badge[data-t="D"] { border-color: rgba(184,156,255,0.4); }
  .badge[data-t="E"] { border-color: rgba(137,184,229,0.4); }
  .start-btn {
    margin-top: 14px; width:100%; max-width:300px;
    /* 改：深紫→珊瑚橙 高飽和 CTA，跟柔和底色形成對比一眼抓住注意力 */
    background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-accent) 100%);
    color:#fff; border:none; padding: 17px 28px;
    border-radius: 999px;
    font-size:clamp(16px,4.2vw,18px); font-weight:700;
    cursor:pointer;
    box-shadow: 0 10px 24px rgba(255,111,145,0.35), 0 4px 10px rgba(91,44,130,0.18);
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 52px;
    letter-spacing: 0.04em;
  }
  .start-btn:hover { box-shadow: 0 12px 28px rgba(255,111,145,0.45), 0 6px 14px rgba(91,44,130,0.22); }
  .start-btn:active { transform: scale(0.97); }
  .name-input {
    padding: 14px 18px;
    border-radius: 999px;
    border: 1.5px solid rgba(184,156,255,0.3);
    width:100%; max-width:300px;
    font-size:15px; margin: 18px 0 4px;
    -webkit-appearance:none;
    background: #fafaff;
    color: var(--c-ink);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
  }
  .name-input::placeholder { color: #b9b1cf; }
  .name-input:focus {
    border-color: var(--c-accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,111,145,0.12);
  }
  .name-input.missing {
    border-color: var(--c-accent);
    background: #fff5f7;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  /* 結果頁 inline 名字表單：輸入框全寬，CTA 在下方 */
  .inline-name-form {
    display:flex; flex-direction:column; align-items:center; gap: 4px;
    padding: 14px;
    background: #fff5f7;
    border-radius: 16px;
    margin: 8px 0;
  }
  .inline-name-form .name-input {
    margin: 4px 0 8px;
  }

  /* ---------- 進度區 ---------- */
  #quizScreen { display:none; }
  .progress-wrap { margin-bottom: 18px; }
  .progress-top {
    display:flex; justify-content:space-between; align-items:center;
    font-size:clamp(11px,3vw,13px);
    color: var(--c-ink-soft);
    margin-bottom:8px;
    font-weight: 600;
  }
  .progress-bar-bg {
    width:100%; height: 10px; background:#efeaf6; border-radius:999px; overflow:hidden;
  }
  .progress-bar-fill {
    height:100%; border-radius:999px;
    background: linear-gradient(90deg, var(--c-relation), var(--c-recruit), var(--c-media));
    width:0%; transition:width 0.4s cubic-bezier(.22,.9,.3,1);
  }
  .mini-scores { display:flex; gap:6px; margin-top: 12px; }
  /* 改：手機上 min-width 不足，預設只顯條不顯標籤；>= 480px 才顯 */
  .mini-score-item {
    flex:1; text-align:center;
    font-size: 9px; color: var(--c-ink-soft);
    min-width: 0;
  }
  .mini-score-label { display:none; }
  .mini-score-bar {
    height: 6px; border-radius:999px; background:#efeaf6; overflow:hidden; margin-top:3px;
  }
  .mini-score-fill {
    height:100%; border-radius:999px; width:0%; transition:width 0.4s;
  }

  .q-title {
    font-size:clamp(16px,4.5vw,19px);
    font-weight: 700;
    color: var(--c-primary);
    margin: 22px 0 16px; line-height: 1.65;
  }
  .options { display:flex; flex-direction:column; gap: 10px; }
  .opt-btn {
    text-align:left; width:100%;
    background: #fafaff;
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 15px 16px;
    font-size:clamp(13.5px,3.7vw,15px); font-weight: 500;
    cursor:pointer;
    transition: all 0.15s;
    display:flex; align-items:center; gap:12px;
    min-height: 52px;
    line-height: 1.5;
    color: var(--c-ink);
  }
  .opt-btn:hover { background: #f3eeff; }
  /* 改：加 .selected 持久樣式，選了要亮起來 */
  .opt-btn:active,
  .opt-btn.selected {
    border-color: var(--c-accent);
    background: #fff0f3;
    transform: scale(0.99);
  }
  .opt-key {
    background: #f0edf6; color: var(--c-ink-soft);
    font-weight: 600;
    width: 26px; height: 26px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 11px; flex-shrink:0;
    letter-spacing: 0;
  }
  .opt-copy {
    display:flex; flex-wrap:wrap; align-items:baseline;
    column-gap: 0.35em; row-gap: 1px;
  }
  .opt-lead {
    color: var(--c-primary);
    font-weight: 750;
  }
  .opt-detail {
    color: var(--c-ink-soft);
    font-weight: 500;
  }
  .opt-detail::before {
    content:"｜";
    color:#c5bdd4;
    margin-right:0.35em;
  }
  .opt-btn.selected .opt-key {
    background: linear-gradient(135deg, var(--c-primary), var(--c-accent));
    color: #fff;
  }

  /* ---------- 結果頁 ---------- */
  #resultScreen { display:none; text-align:center; }
  /* 改：emoji 主視覺區，加柔和圓暈讓 hero 立體 */
  .result-emoji {
    font-size: clamp(56px,16vw,76px);
    margin-bottom: 6px;
    animation: bounce 1.6s ease-in-out infinite;
    display:inline-block;
    filter: drop-shadow(0 6px 12px rgba(91,44,130,0.12));
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0)   rotate(0deg); }
    50%     { transform: translateY(-10px) rotate(-2deg); }
  }
  #resultTitle {
    font-size:clamp(19px,5.2vw,25px); font-weight:800;
    color: var(--c-primary);
    margin-bottom: 6px; line-height: 1.4;
    letter-spacing: 0.01em;
  }
  #resultSub {
    font-size:clamp(13px,3.5vw,15px); color: var(--c-accent);
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }
  #resultDesc {
    background: var(--c-cream);
    border-radius: 18px; padding: 16px 18px;
    font-size:clamp(13px,3.5vw,14.5px);
    color: var(--c-ink);
    line-height: 1.85;
    text-align:left;
    margin-bottom: 18px;
  }

  /* 改：結果頁新增五色帶 hero strip（從主色淡到白） */
  .color-band {
    display:flex; height: 6px; border-radius: 999px; overflow:hidden;
    margin: 0 auto 22px; width: 88%;
    box-shadow: 0 2px 6px rgba(91,44,130,0.08);
  }
  .color-band span { flex:1; }
  .color-band .b-A { background: var(--c-relation); }
  .color-band .b-B { background: var(--c-tool); }
  .color-band .b-C { background: var(--c-retail); }
  .color-band .b-D { background: var(--c-recruit); }
  .color-band .b-E { background: var(--c-media); }

  .score-chart { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .score-row { display:flex; align-items:center; gap:10px; }
  .score-label {
    width: clamp(78px,22vw,108px);
    font-size:clamp(11.5px,3.1vw,13px);
    text-align:left; color: var(--c-ink);
    flex-shrink:0; font-weight: 600;
  }
  .score-bar-bg {
    flex:1; height: 14px;
    background: #efeaf6; border-radius:999px; overflow:hidden;
  }
  .score-bar-fill {
    height:100%; border-radius:999px;
    width:0%; transition:width 1.1s cubic-bezier(.22,.9,.3,1);
  }
  .score-val {
    width: 26px; font-size:12px; color:var(--c-ink-soft);
    text-align:right; flex-shrink:0; font-weight: 700;
  }
  .secondary-box {
    background: linear-gradient(135deg, #eef7ff, #f5eaff);
    border-radius: 18px; padding: 16px 18px;
    margin-bottom: 20px;
    font-size:clamp(12.5px,3.4vw,14px);
    color: var(--c-ink);
    text-align:left; line-height:1.8;
  }
  .secondary-box b { color: var(--c-primary); }

  /* ---------- 彩蛋題 ---------- */
  .bonus-box {
    background: linear-gradient(135deg, #eef4ff, #f5eaff);
    border-radius: 18px; padding: 18px;
    margin-bottom: 20px; text-align:left;
  }
  .bonus-box .bt {
    font-size:clamp(14px,3.9vw,15.5px);
    font-weight:700; color: var(--c-primary);
    margin-bottom: 8px;
  }
  .bonus-box .bd {
    font-size:clamp(12.5px,3.4vw,13.5px); color: var(--c-ink-soft);
    margin-bottom: 14px; line-height:1.7;
  }
  .bonus-opts { display:flex; flex-direction:column; gap:10px; }
  .bonus-opt {
    background:#fff; border: 2px solid #e6e0f5;
    border-radius: 14px;
    padding: 12px 14px;
    font-size:clamp(12.5px,3.4vw,14px);
    cursor:pointer; text-align:left;
    display:flex; align-items:center; gap:10px;
    min-height: 48px;
    transition: all 0.15s;
    color: var(--c-ink);
  }
  .bonus-opt.selected {
    border-color: var(--c-recruit);
    background: #f5f0ff;
    font-weight: 600;
  }
  .bonus-opt:hover { border-color: rgba(184,156,255,0.5); }

  .action-btns { display:flex; flex-direction:column; gap: 10px; align-items:center; }
  .action-btns button {
    border:none; padding: 14px 22px; border-radius: 999px;
    font-size:clamp(14px,3.8vw,15.5px); font-weight:700;
    cursor:pointer;
    width:100%; max-width:320px; min-height: 50px;
    letter-spacing: 0.02em;
  }
  #submitBtn {
    background: linear-gradient(135deg, #56d8a5, var(--c-mint));
    color:#fff;
    box-shadow: 0 8px 20px rgba(78,205,196,0.32);
  }
  #submitBtn:hover { box-shadow: 0 10px 24px rgba(78,205,196,0.42); }
  #submitBtn:active { transform: scale(0.98); }
  #retryBtn {
    background: #efeaf6; color: var(--c-ink);
  }
  #retryBtn:hover { background: #e3daef; }
  #submitStatus {
    margin-top: 14px; font-size:13px; color: var(--c-mint);
    min-height: 20px; font-weight: 600;
  }

  /* 改：confetti 升級為 emoji 慶祝元素 */
  .confetti {
    position:fixed;
    top:-20px;
    z-index:999;
    pointer-events:none;
    animation: fall cubic-bezier(.5,0,.7,1) forwards;
    will-change: transform;
  }
  @keyframes fall {
    0%   { transform: translate3d(0,0,0) rotateZ(0);  opacity:1; }
    85%  { opacity: 1; }
    100% { transform: translate3d(var(--drift,20px), 110vh, 0) rotateZ(720deg); opacity:0.2; }
  }

  @media (max-width: 380px){
    .card { padding: 18px 12px 26px; }
    .q-title { margin-top: 14px; }
  }
  /* 改：>= 480px 才顯 mini-score 標籤，桌面也顯 emoji */
  @media (min-width: 480px){
    .mini-score-label { display: block; margin-bottom: 1px; }
    .mini-score-item { font-size: 10px; }
  }
  @media (min-width: 560px){
    .badge-row { flex-wrap:nowrap; }
  }
  @media (min-width: 640px){
    .float-emoji { display:block; }
  }
</style>
</head>
<body>

<script>
  /* 改：用格點 + 不同 base 讓 emoji 分散不疊 */
  const emojis = ["❤️","🎯","🛍️","🛠️","📱","✨","🌟","🤖"];
  const emojiCount = window.innerWidth < 640 ? 10 : 18;
  /* 在 -10vh~110vh 之間均匀分佈起始點，避免全部從下方同時冒出 */
  for (let i=0;i<emojiCount;i++){
    const el = document.createElement("div");
    el.className="float-emoji";
    el.textContent = emojis[i % emojis.length];
    el.style.left = ((i + 0.5) / emojiCount * 100 + (Math.random()*4-2)) + "vw";
    /* 起始高度分散，避免擠在底部同一排 */
    el.style.top = (Math.random() * 120 - 10) + "vh";
    el.style.animationDuration = (12 + Math.random() * 10) + "s";
    el.style.animationDelay = (-Math.random() * 14) + "s"; /* 負延遲一開始就已不同步 */
    document.body.appendChild(el);
  }
</script>

<div class="card">

  <!-- 開場頁 -->
  <div id="startScreen">
    <div style="font-size:clamp(38px,10vw,46px); margin-bottom: 6px;">🧭✨</div>
    <h1>找到你的<span class="accent">教練天賦</span></h1>
    <div class="sub">
      這不是人格測驗，也沒有對錯。<br>
      只是想問你一件事：<br>
      <b>「當你想幫助別人成長時，你最自然會做什麼？」</b>
    </div>
    <div class="badge-row">
      <div class="badge" data-t="A"><span class="emo">❤️</span>關係教練</div>
      <div class="badge" data-t="D"><span class="emo">🎯</span>招募教練</div>
      <div class="badge" data-t="C"><span class="emo">🛍️</span>零售教練</div>
      <div class="badge" data-t="B"><span class="emo">🛠️</span>工具教練</div>
      <div class="badge" data-t="E"><span class="emo">📱</span>自媒體/IP</div>

const optKeys = ["A","B","C","D","E"];

let current = 0;
let scores = {A:0,B:0,C:0,D:0,E:0};
let userName = "";
let bonusAnswer = "";
let isTransitioning = false;
let isSubmitting = false;
let submitted = false;

const STORAGE_KEY = "coachingQuizProgressV1";

function saveProgress(screen){
  try {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
      current, scores, userName, bonusAnswer, screen, submitted
    }));
  } catch (error) {
    console.warn("無法暫存測驗進度", error);
  }
}

function restoreProgress(){
  try {
    const saved = JSON.parse(sessionStorage.getItem(STORAGE_KEY));
    const validScores = saved && optKeys.every(k => Number.isInteger(saved.scores?.[k]) && saved.scores[k] >= 0);
    const total = validScores ? optKeys.reduce((sum, k) => sum + saved.scores[k], 0) : -1;
    if (!validScores || !Number.isInteger(saved.current) || saved.current < 0 || saved.current > questions.length || total !== saved.current) return;

    current = saved.current;
    scores = saved.scores;
    userName = typeof saved.userName === "string" ? saved.userName : "";
    bonusAnswer = typeof saved.bonusAnswer === "string" ? saved.bonusAnswer : "";
    submitted = saved.submitted === true;
    document.getElementById("userName").value = userName;

    if (current > 0 && current < questions.length) {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";
      renderMiniScores();
      renderQuestion();
    } else if (current === questions.length && saved.screen === "result" && submitted) {
      showResult(false);
    } else if (current === questions.length) {
      showBonus();
      const selected = [...document.querySelectorAll(".bonus-opt")].find(el => el.dataset.v === bonusAnswer);
      if (selected) selected.classList.add("selected");
    }
  } catch (error) {
    sessionStorage.removeItem(STORAGE_KEY);
    console.warn("測驗暫存資料已重設", error);
  }
}

function resetQuiz(){
  sessionStorage.removeItem(STORAGE_KEY);

}

// Fisher-Yates 洗牌：只打亂顯示順序，type 屬性隨物件移動，不影響計分
function shuffle(array){
  const arr = array.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function renderMiniScores(){
  const wrap = document.getElementById("miniScores");
  wrap.innerHTML = "";
  optKeys.forEach(k=>{
    const t = types[k];
    const div = document.createElement("div");
    div.className = "mini-score-item";
    /* 含 emoji + 標籤，但標籤在 < 480px 被 CSS 隱藏 */
    div.innerHTML = `<div class="mini-score-label">${t.emoji}</div><div class="mini-score-bar"><div class="mini-score-fill" id="mini-${k}" style="background:${t.color}"></div></div>`;
    wrap.appendChild(div);
  });
  updateMiniScores();
}

function updateMiniScores(){
  const max = Math.max(1, ...Object.values(scores));
  optKeys.forEach(k=>{
    const pct = (scores[k]/Math.max(max,1))*100;
    const el = document.getElementById("mini-"+k);
    if(el) el.style.width = pct+"%";
  });
}

function startQuiz(){
  userName = document.getElementById("userName").value || "";
  document.getElementById("startScreen").style.display="none";
  document.getElementById("quizScreen").style.display="block";
  renderMiniScores();
  renderQuestion();
  saveProgress("quiz");
}

function renderQuestion(){
  isTransitioning = false;
  const q = questions[current];
  document.getElementById("qIndexLabel").textContent = `第 ${current+1} / ${questions.length} 題`;
  /* 改：已答題數 / 總題數（最後一題顯示 100% 而非 95%） */
  const pct = Math.round(((current+1)/questions.length)*100);
  document.getElementById("qPercentLabel").textContent = pct+"%";
  document.getElementById("progressFill").style.width = pct+"%";
  document.getElementById("qTitle").textContent = `${current+1}. ${q.q}`;

  /* 每次進入此題都重新隨機排列選項顯示順序 */
  const shuffledOpts = shuffle(q.opts);

  const wrap = document.getElementById("optionsWrap");
  wrap.innerHTML = "";
  shuffledOpts.forEach((opt, idx)=>{
    const displayKey = optKeys[idx]; // 只是顯示用的字母標籤，跟計分無關
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.setAttribute("aria-label", opt.t);

    const key = document.createElement("span");
    key.className = "opt-key";
    key.setAttribute("aria-hidden", "true");
    key.textContent = displayKey;

    const copy = document.createElement("span");
    copy.className = "opt-copy";
    const parts = opt.t.match(/^(.+?)[，、／](.+)$/);
    const lead = document.createElement("strong");
    lead.className = "opt-lead";
    lead.textContent = parts ? parts[1] : opt.t;
    copy.appendChild(lead);
    if(parts){
      const detail = document.createElement("span");
      detail.className = "opt-detail";
      detail.textContent = parts[2];
      copy.appendChild(detail);
    }

    btn.append(key, copy);
    btn.onclick = ()=> selectOption(opt.type); // 依據 opt.type 計分，不受顯示順序影響
    wrap.appendChild(btn);
  });
  window.scrollTo({top:0, behavior:"smooth"});
}

function selectOption(type){
  if (isTransitioning || !optKeys.includes(type)) return;
  isTransitioning = true;
  document.querySelectorAll("#optionsWrap .opt-btn").forEach(btn => btn.disabled = true);
  scores[type]++;
  updateMiniScores();
  current++;
  saveProgress(current < questions.length ? "quiz" : "bonus");
  if(current < questions.length){
    setTimeout(renderQuestion, 200);
  } else {
    setTimeout(showBonus, 300);
  }
}

function showBonus(){
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("bonusScreen").style.display="block";
  window.scrollTo(0,0);
  document.querySelectorAll(".bonus-opt").forEach(el=>{
    el.onclick = ()=>{
      document.querySelectorAll(".bonus-opt").forEach(o=>o.classList.remove("selected"));
      el.classList.add("selected");
      bonusAnswer = el.getAttribute("data-v");
      saveProgress("bonus");
    };
  });
}

function getResultRanking(){
  const sorted = optKeys.slice().sort((a,b)=>scores[b]-scores[a]);
  const topScore = scores[sorted[0]];
  const primaryKeys = sorted.filter(k => scores[k] === topScore);
  const secondaryKey = sorted.find(k => scores[k] < topScore) || null;
  return {sorted, primaryKeys, secondaryKey};
}

function showResult(celebrate = true){
  document.getElementById("bonusScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";
  window.scrollTo({top:0, behavior:"smooth"});

  const {sorted, primaryKeys, secondaryKey} = getResultRanking();
  const primaryTypes = primaryKeys.map(k => types[k]);
  const primaryNames = primaryTypes.map(t => t.name).join(" × ");
  const isTie = primaryTypes.length > 1;

  document.getElementById("resultEmoji").textContent = primaryTypes.map(t => t.emoji).join("");
  document.getElementById("resultTitle").textContent = `${userName ? userName + "，" : ""}你是「${primaryNames}」${isTie ? "並列主修" : "型"}`;
  document.getElementById("resultSub").textContent = primaryTypes.map(t => t.en).join(" × ");
  document.getElementById("resultDesc").textContent = isTie
    ? `你的最高分由 ${primaryTypes.map(t => t.name).join("、")} 並列，這些都是你的主修天賦。`
    : primaryTypes[0].desc;

  const secondaryBox = document.getElementById("secondaryBox");
  if (secondaryKey) {
    const secondary = types[secondaryKey];
    secondaryBox.innerHTML = `<b>${secondary.emoji} 你的副修天賦：${secondary.name}</b><br>${secondary.desc}`;
    secondaryBox.style.display = "block";
  } else {
    secondaryBox.style.display = "none";
  }

  const chart = document.getElementById("scoreChart");
  chart.innerHTML = "";
  const maxScore = Math.max(...Object.values(scores), 1);
  sorted.forEach(k=>{
    const t = types[k];
    const row = document.createElement("div");
    row.className = "score-row";
    row.innerHTML = `
      <div class="score-label">${t.emoji} ${t.name}</div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="background:${t.color}" id="bar-${k}"></div></div>
      <div class="score-val">${scores[k]}</div>`;
    chart.appendChild(row);
  });
  setTimeout(()=>{
    sorted.forEach(k=>{
      const el = document.getElementById("bar-"+k);
      if(el) el.style.width = (scores[k]/maxScore*100)+"%";
    });
  }, 100);

  saveProgress("result");
  if (celebrate) launchConfetti();
}

function launchConfetti(){
  /* 升級：五力 emoji + 圓點 + 細短帶，撒出真正「值得慶祝」的感覺 */
  const stickers = ["❤️","🎯","🛍️","🛠️","📱","✨","🌟","⭐","🎉","🎊"];
  const colors   = ["#FF8AAE","#7FD8C5","#FFB37A","#B89CFF","#89B8E5","#FFD93D"];
  const count = window.innerWidth < 640 ? 40 : 64;
  for(let i=0;i<count;i++){
    const isSticker = Math.random() < 0.55;
    const c = document.createElement("div");
    c.className="confetti";
    c.style.left = Math.random()*100+"vw";
    /* 隨機水平偏移，讓落點不會筆直 */
    const drift = (Math.random()-0.5) * 80;
    c.style.setProperty("--drift", drift+"px");
    c.style.animationDuration = (2.4+Math.random()*2.2)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    if (isSticker) {
      /* emoji sticker */
      const ch = stickers[Math.floor(Math.random()*stickers.length)];
      c.textContent = ch;
      c.style.fontSize = (16 + Math.random()*14) + "px";
      c.style.lineHeight = "1";
      c.style.background = "transparent";
    } else {
      /* 色塊 */
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      const w = 6 + Math.random()*7;
      c.style.width = w + "px";
      c.style.height = (Math.random()>0.5 ? w : (w*0.4)) + "px";
      c.style.borderRadius = (Math.random()>0.5 ? "50%" : "2px");
    }
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5500);
  }
}

// ============ 串接 Google Sheets（請貼上你的 Apps Script Web App 網址） ============
const GOOGLE_SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbypdgp6Vx76M7ntN0r_jdrYcViMYpwDAcGr64z2QHQKatCAwhX9D4Uvk7WG-IkjKxsZFQ/exec";

async function submitResult(){
  if (isSubmitting || submitted) return;
  const {primaryKeys, secondaryKey} = getResultRanking();
  /* 送出前檢查：未填名字時在彩蛋頁直接提示，不跳回首頁中斷流程 */
  if (!userName || !userName.trim()) {
    const statusEl = document.getElementById("submitStatus");
    statusEl.style.color = "var(--c-accent)";
    /* 在彩蛋頁顯示名字輸入框，再繼續送出 */
    statusEl.innerHTML = `
      <div class="inline-name-form" style="margin: 8px 0 4px;">
        <div style="font-weight:700; margin-bottom:8px;">⚠️ 送出前需要你的名字</div>
        <input id="inlineName" class="name-input missing" type="text" placeholder="請輸入你的名字" autocomplete="name" style="margin: 0 0 10px;">
        <button id="confirmNameBtn" style="background: linear-gradient(135deg, var(--c-primary), var(--c-accent)); color:#fff; border:none; padding: 12px 22px; border-radius: 999px; font-weight:700; font-size: 14px; cursor:pointer; min-height: 44px;">確認名字並送出</button>
      </div>`;
    /* 重新綁事件 */
    const inlineInput = document.getElementById("inlineName");
    const confirmBtn = document.getElementById("confirmNameBtn");
    inlineInput.focus();
    inlineInput.addEventListener("input", () => {
      if (inlineInput.value.trim()) inlineInput.classList.remove("missing");
    });
    confirmBtn.onclick = () => {
      const v = inlineInput.value.trim();
      if (!v) {
        inlineInput.classList.add("missing");
        /* 重新觸發動畫 */
        setTimeout(() => inlineInput.classList.remove("missing"), 500);
        inlineInput.focus();
        return;
      }
      userName = v;
      /* 接到原本送出流程：清掉表單 + 重設 status 顏色 + 遞迴呼叫自己 */
      statusEl.innerHTML = "";
      submitResult();
    };
    return;
  }
  const payload = {
    name: userName,
    timestamp: new Date().toISOString(),
    primary: primaryKeys.map(k => types[k].name).join("、"),
    secondary: secondaryKey ? types[secondaryKey].name : "無（全部並列）",
    scoreA: scores.A, scoreB: scores.B, scoreC: scores.C, scoreD: scores.D, scoreE: scores.E,
    aiAdvisorInterest: bonusAnswer || "未填答"
  };
  const statusEl = document.getElementById("submitStatus");
  statusEl.style.color = "var(--c-mint)";

  if(GOOGLE_SHEET_WEBHOOK_URL.startsWith("PASTE_")){
    statusEl.textContent = "⚠️ 尚未設定 Google Sheets 網址，結果暫存於此頁面";
    console.log("QUIZ_RESULT_PAYLOAD", payload);
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);
  isSubmitting = true;
  submitBtn.disabled = true;
  statusEl.textContent = "傳送中...";
  try {
    await fetch(GOOGLE_SHEET_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"text/plain;charset=UTF-8"},
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    submitted = true;
    saveProgress("result");
    showResult();
  } catch (error) {
    submitBtn.disabled = false;
    statusEl.style.color = "var(--c-accent)";
    statusEl.textContent = error.name === "AbortError"
      ? "❌ 傳送逾時，請稍後再試"
      : "❌ 無法確認送出成功，請稍後再試";
    console.error("送出結果失敗", error);
  } finally {
    clearTimeout(timeoutId);
    isSubmitting = false;
  }
}

restoreProgress();
</script>
